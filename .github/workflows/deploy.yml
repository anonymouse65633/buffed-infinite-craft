name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install obfuscator
        run: npm install -g javascript-obfuscator

      - name: Fix script case sensitivity in index.html
        run: |
          sed -i 's|src="admin.js"|src="Admin.js"|g'         index.html
          sed -i 's|src="anticheat.js"|src="Anticheat.js"|g' index.html

      - name: Inject API keys into config.js
        env:
          GROQ:        ${{ secrets.GROQ_API_KEY }}
          GEMINI:      ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER:  ${{ secrets.OPENROUTER_API_KEY }}
          COHERE:      ${{ secrets.COHERE_API_KEY }}
          HUGGINGFACE: ${{ secrets.HUGGINGFACE_API_KEY }}
          FIREBASE:    ${{ secrets.FIREBASE_API_KEY }}
        run: |
          sed -i "s|GROQ_PLACEHOLDER|${GROQ}|g"               config.js
          sed -i "s|GEMINI_PLACEHOLDER|${GEMINI}|g"           config.js
          sed -i "s|OPENROUTER_PLACEHOLDER|${OPENROUTER}|g"   config.js
          sed -i "s|COHERE_PLACEHOLDER|${COHERE}|g"           config.js
          sed -i "s|HUGGINGFACE_PLACEHOLDER|${HUGGINGFACE}|g" config.js
          sed -i "s|FIREBASE_PLACEHOLDER|${FIREBASE}|g"       config.js
          if grep -q "PLACEHOLDER" config.js; then
            echo "❌ Placeholders not replaced!"; grep "PLACEHOLDER" config.js; exit 1
          fi
          echo "✅ All keys injected"

      - name: Obfuscate game logic files
        run: |
          # Obfuscate only self-contained files with no cross-file global deps.
          # firebase.js and Admin.js are excluded — obfuscator renames their
          # cross-file references (FIREBASE_CONFIG, _bcSetAudience) even with
          # --rename-globals false.
          for f in llm.js state.js game.js constants.js leaderboard.js Anticheat.js; do
            if [ -f "$f" ]; then
              javascript-obfuscator "$f" \
                --output "$f" \
                --compact true \
                --self-defending false \
                --control-flow-flattening false \
                --dead-code-injection true \
                --dead-code-injection-threshold 0.3 \
                --identifier-names-generator hexadecimal \
                --rename-globals false \
                --transform-object-keys false \
                --string-array true \
                --string-array-encoding rc4 \
                --string-array-threshold 0.8 \
                --unicode-escape-sequence true
              echo "✅ Obfuscated $f"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

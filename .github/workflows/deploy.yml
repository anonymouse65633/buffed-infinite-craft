name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install obfuscator
        run: npm install -g javascript-obfuscator

      - name: Inject API keys into config.js
        env:
          GROQ:        ${{ secrets.GROQ_API_KEY }}
          GEMINI:      ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER:  ${{ secrets.OPENROUTER_API_KEY }}
          COHERE:      ${{ secrets.COHERE_API_KEY }}
          HUGGINGFACE: ${{ secrets.HUGGINGFACE_API_KEY }}
          FIREBASE:    ${{ secrets.FIREBASE_API_KEY }}
        run: |
          sed -i "s|GROQ_PLACEHOLDER|${GROQ}|g"               config.js
          sed -i "s|GEMINI_PLACEHOLDER|${GEMINI}|g"           config.js
          sed -i "s|OPENROUTER_PLACEHOLDER|${OPENROUTER}|g"   config.js
          sed -i "s|COHERE_PLACEHOLDER|${COHERE}|g"           config.js
          sed -i "s|HUGGINGFACE_PLACEHOLDER|${HUGGINGFACE}|g" config.js
          sed -i "s|FIREBASE_PLACEHOLDER|${FIREBASE}|g"       config.js
          if grep -q "PLACEHOLDER" config.js; then
            echo "❌ Placeholders not replaced!"; grep "PLACEHOLDER" config.js; exit 1
          fi
          echo "✅ All keys injected"

      - name: Obfuscate JS files
        run: |
          for f in config.js firebase.js llm.js main.js state.js game.js constants.js leaderboard.js auth.js Admin.js Anticheat.js; do
            if [ -f "$f" ]; then
              javascript-obfuscator "$f" \
                --output "$f" \
                --compact true \
                --self-defending true \
                --control-flow-flattening true \
                --control-flow-flattening-threshold 0.4 \
                --dead-code-injection true \
                --dead-code-injection-threshold 0.2 \
                --identifier-names-generator hexadecimal \
                --rename-globals false \
                --transform-object-keys false \
                --reserved-names "^(FIREBASE_CONFIG|GROQ_API_KEY|GEMINI_API_KEY|OPENROUTER_API_KEY|COHERE_API_KEY|HUGGINGFACE_API_KEY|ADMIN|ADMIN_UIDS|ADMIN_USERNAMES|AUTH_USER|AUTH_UID|PLAYER_NAME|KNOWN_COMBOS|SHOP|QUESTS|MILESTONES|STARTERS|SORT_LABELS|BOOSTER_DURATIONS|showTokenToast|sendBroadcast|initializeFirebase|authInit|loadGame|saveGame|levelThreshold)$" \
                --string-array true \
                --string-array-encoding rc4 \
                --string-array-threshold 0.75 \
                --unicode-escape-sequence false
              echo "✅ Obfuscated $f"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

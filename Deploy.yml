name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install obfuscator
        run: npm install -g javascript-obfuscator

      - name: Generate config.js from secrets
        run: |
          cat > config.js << 'ENDOFCONFIG'
          const GROQ_API_KEY        = "GROQ_PLACEHOLDER";
          const GEMINI_API_KEY      = "GEMINI_PLACEHOLDER";
          const OPENROUTER_API_KEY  = "OPENROUTER_PLACEHOLDER";
          const COHERE_API_KEY      = "COHERE_PLACEHOLDER";
          const HUGGINGFACE_API_KEY = "HUGGINGFACE_PLACEHOLDER";
          const FIREBASE_CONFIG = {
            apiKey:            "FIREBASE_PLACEHOLDER",
            authDomain:        "infinite-craft-remake-56705.firebaseapp.com",
            projectId:         "infinite-craft-remake-56705",
            storageBucket:     "infinite-craft-remake-56705.firebasestorage.app",
            messagingSenderId: "347877015349",
            appId:             "1:347877015349:web:3d79ea8db71c5fa57cd67c"
          };
          ENDOFCONFIG
          sed -i "s|GROQ_PLACEHOLDER|${{ secrets.GROQ_API_KEY }}|g"             config.js
          sed -i "s|GEMINI_PLACEHOLDER|${{ secrets.GEMINI_API_KEY }}|g"         config.js
          sed -i "s|OPENROUTER_PLACEHOLDER|${{ secrets.OPENROUTER_API_KEY }}|g" config.js
          sed -i "s|COHERE_PLACEHOLDER|${{ secrets.COHERE_API_KEY }}|g"         config.js
          sed -i "s|HUGGINGFACE_PLACEHOLDER|${{ secrets.HUGGINGFACE_API_KEY }}|g" config.js
          sed -i "s|FIREBASE_PLACEHOLDER|${{ secrets.FIREBASE_API_KEY }}|g"     config.js

      - name: Obfuscate all JS files
        run: |
          for f in config.js firebase.js llm.js main.js state.js game.js constants.js leaderboard.js auth.js Admin.js Anticheat.js; do
            if [ -f "$f" ]; then
              javascript-obfuscator "$f" \
                --output "$f" \
                --compact true \
                --self-defending true \
                --control-flow-flattening true \
                --control-flow-flattening-threshold 0.5 \
                --dead-code-injection true \
                --dead-code-injection-threshold 0.3 \
                --identifier-names-generator hexadecimal \
                --rename-globals false \
                --string-array true \
                --string-array-encoding rc4 \
                --string-array-threshold 0.75 \
                --transform-object-keys true \
                --unicode-escape-sequence false
              echo "✅ Obfuscated $f"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
